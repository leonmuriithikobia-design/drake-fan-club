<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Triza ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: black;
    color: white;
    overflow: hidden;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
}

#loading {
    font-size: 24px;
}

#main {
    display: none;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.yes { background: #00ff9f; }
.no {
    background: #ff4d6d;
    position: absolute;
}

#text {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}

#final {
    display: none;
    font-size: 22px;
    margin-top: 20px;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 Drake - Fancy -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/Wj8C2jF9m6A?enablejsapi=1"
frameborder="0" allow="autoplay"></iframe>

<!-- LOADING -->
<div id="loading" class="center">
    <p>Loading something special for you... ⏳</p>
</div>

<!-- MAIN -->
<div id="main" class="center">
    <div class="card">
        <h2 id="text"></h2>

        <p>So tell me… 👀</p>

        <button class="btn yes" onclick="yesClicked()">Yes 😏</button>
        <button class="btn no" id="noBtn">No 😭</button>

        <div id="final">
            Triza… I’m really glad it’s you ❤️
        </div>
    </div>
</div>

<script>
// LOADING → MAIN
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "flex";
    typeText();
}, 2500);

// TYPEWRITER TEXT
const message = "Hey Triza... I tried to play it cool, but I like you. A lot.";
let i = 0;

function typeText() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    }
}

// YES CLICK
function yesClicked() {
    document.getElementById("final").style.display = "block";
    playMusic();
    hearts();
}

// PLAY YOUTUBE AUDIO
function playMusic() {
    const iframe = document.getElementById("music");
    iframe.src += "&autoplay=1";
}

// RUNAWAY NO BUTTON 💀
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * window.innerHeight + "px";
    noBtn.style.left = Math.random() * window.innerWidth + "px";
});

// HEARTS
function hearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}
</script>

</body>
</html>
